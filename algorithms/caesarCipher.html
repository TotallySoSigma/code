<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher</title>
</head>
  
<body>
    <textarea id="text" placeholder="Insert text here"></textarea>
    <div>
        <label for="lettersMovedOver">Amount of letters moved over:</label>
        <input id="lettersMovedOver" type="number" value="2" min="0" max="25">
    </div>
    <div>
        <label for="encodeDecode">Choose to encode or decode:</label>
        <select id="encodeDecode">
            <option value="encode">Encode</option>
            <option value="decode">Decode</option>
        </select>
        <button type="button" onclick="run()">Run</button>
        <button type="button" onclick="clearFields()">Clear</button>
    </div>
    <textarea id="output" placeholder="Result" readonly></textarea>
    <script>
        function caesar(text, shift) {
            shift = ((shift % 26) + 26) % 26;
            let out = '';
            for (let i = 0; i < text.length; i++) {
                let ch = text[i];
                let code = text.charCodeAt(i);
                if (code >= 65 && code <= 90) { // A-Z
                    out += String.fromCharCode(((code - 65 + shift) % 26) + 65);
                } else if (code >= 97 && code <= 122) { // a-z
                    out += String.fromCharCode(((code - 97 + shift) % 26) + 97);
                } else {
                    out += ch;
                }
            }
            return out;
        }

        function run() {
            const textBox = document.getElementById('text').value;
            const shiftNumber = parseInt(document.getElementById('lettersMovedOver').value, 10) || 0;
            const mode = document.getElementById('encodeDecode').value;
            const result = mode === 'encode' ? caesar(textBox, shiftNumber) : caesar(textBox, -shiftNumber);
            document.getElementById('output').value = result;

            // Basic self-tests
            console.assert(caesar('A', 2) === 'C', 'Test 1 failed');
            console.assert(caesar('Z', 2) === 'B', 'Test 2 failed');
            console.assert(caesar('hello person', 2) === 'jgnnq rgtqpu', 'Test 3 expected spacing preserved');
            console.assert(caesar('', 2) === '', 'Test 4 failed');
            console.log(result);
        }

        function clearFields() {
            document.getElementById('text').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>

</html>
